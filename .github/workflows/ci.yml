name: Trading Bot CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run Unit Tests
      run: |
        pytest tests/

    - name: Run Data Quality Check (Dry Run)
      # Just verification that script runs, doesn't actually fail unless crash
      # We skip because it requires DB connection (Postgres/SQLite).
      # CI runner won't have the DB populate. 
      # So we stick to unit tests which mock DB.
      run: echo "Skipping Integration Tests (No DB)"
